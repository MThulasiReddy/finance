<!DOCTYPE html>
<html>
<head>
    <title>Add Loan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .container{
            max-width:700px;
            margin-top:40px;
        }

        .card{
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }
    </style>

</head>
<body>

<div class="container">

    <div class="card">

        <div class="card-header bg-primary text-white">
            <h3>Add New Loan</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Borrower Name</label>
                    <input type="text"
                           name="borrower_name"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Loan Amount (₹)</label>
                    <input type="number"
                           step="0.01"
                           name="amount"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Interest Rate (%)</label>
                    <input type="number"
                           step="0.01"
                           name="interest_rate"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Loan Date</label>
                    <input type="date"
                           name="loan_date"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Duration (Months)</label>
                    <input type="number"
                           name="duration_months"
                           class="form-control"
                           required>
                </div>

                <button type="submit" class="btn btn-success">
                    Save Loan
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
